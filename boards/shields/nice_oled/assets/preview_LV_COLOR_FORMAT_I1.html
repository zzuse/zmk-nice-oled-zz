        for (let y = 0; y < height; y++) {
            let bitsLeft = 0;
            let currentByte = 0;
            for (let x = 0; x < width; x++) {
                if (bitsLeft === 0) {
                    currentByte = data[byteIdx++];
                    bitsLeft = 8;
                }
                // I1 format: 1 bit per pixel.
                const pIdx = (currentByte >> (bitsLeft - 1)) & 0x01;
                const [r, g, b, a] = palette[pIdx];
                const offset = (y * width + x) * 4;
                imgData.data[offset] = r;
                imgData.data[offset + 1] = g;
                imgData.data[offset + 2] = b;
                imgData.data[offset + 3] = a;
                bitsLeft -= 1;
            }
        }
