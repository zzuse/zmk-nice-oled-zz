<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="-2 -22 132 58" width="660" height="290" xmlns="http://www.w3.org/2000/svg" style="font-family: monospace;">
  <!-- Physical screen 128x32. Values are specified from logic 128x128 canvas (rotated ccw 90). logic y = physical x. Logic 128-x = physical y. -->
  <rect x="0" y="0" width="128" height="32" fill="#111" stroke="#666" stroke-width="0.5"/>

  <!-- Y:0 "PER*" text big font -->
  <rect x="0" y="0" width="16" height="32" fill="#300" stroke="#f44" stroke-width="0.4"/>
  <text x="8" y="10" fill="#f44" font-size="5" text-anchor="middle" writing-mode="tb">PER*</text>

  <!-- Y:16 Uptime -->
  <rect x="16" y="0" width="10" height="32" fill="#202" stroke="#f8c" stroke-width="0.4"/>
  <text x="21" y="4" fill="#f8c" font-size="5" text-anchor="middle" writing-mode="tb">99999</text>

  <!-- Y:26-103 Animation (Spaceman) -->
  <rect x="26" y="0" width="78" height="32" fill="rgba(0,255,200,0.1)" stroke="cyan" stroke-width="0.5" stroke-dasharray="2"/>
  <text x="65" y="18" fill="cyan" font-size="7" text-anchor="middle">SPACEMAN ANIMATION</text>
  <text x="65" y="26" fill="cyan" font-size="4" text-anchor="middle">(24, -18 rotated logic)</text>

  <!-- Y:106 Connection Stack -->
  <rect x="106" y="0" width="10" height="32" fill="#003" stroke="#44f" stroke-width="0.4"/>
  <!-- L<=ON uses normal text. y start is 106. -->
  <text x="111" y="4" fill="#44f" font-size="5" text-anchor="middle" writing-mode="tb">L&lt;=ON</text>

  <!-- Y:118 Battery Strip -->
  <rect x="118" y="0" width="10" height="32" fill="#2a1a00" stroke="#fa0" stroke-width="0.4" opacity="0.3"/>
  <text x="123" y="4" fill="#fa0" font-size="5" text-anchor="middle" writing-mode="tb">100%</text>
  <text x="123" y="28" fill="#ff0" font-size="5" text-anchor="middle">⚡</text>

  <!-- Labels -->
  <text x="8" y="-5" fill="#f44" font-size="3.5" text-anchor="middle">TITLE</text>
  <text x="21" y="-5" fill="#f8c" font-size="3.5" text-anchor="middle">UPTIME</text>
  <text x="65" y="-5" fill="cyan" font-size="3.5" text-anchor="middle">ANIMATION Y</text>
  <text x="111" y="-5" fill="#44f" font-size="3.5" text-anchor="middle">LNK</text>
  <text x="123" y="-5" fill="#fa0" font-size="3.5" text-anchor="middle">BAT</text>
</svg>
